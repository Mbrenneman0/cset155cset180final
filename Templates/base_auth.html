<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/auth.css') }}">
    <title>Document</title>
</head>
<body class="auth_bg flex-cont">
    <form action="" method="POST">
        <img src="{{ url_for('static', filename='images/TradeHive_Logo.png') }}">
        <h1>{{ title }}</h1>
        {% if log_type is defined %}
            <p>Enter your credentials to access your account.</p>
        {% else %}
            <p>Enter your credentials to create your account.</p>
        {% endif %}
        {% for input in inputs %}
            <h3>{{ input }}</h3>
            <input type="text" name="{{ input|lower }}" placeholder='{{ input|lower }}' class="input_fields" required>
        {% endfor %}
        {% if log_type is defined %}
            <a href="{{ url_for('authenticate.login_username') if 'username' in log_type.lower() else url_for('authenticate.login_email') }}">{{ log_type }}</a>
        {% endif %}
        <input type="submit" value="{{ 'Login' if log_type is defined else 'Register' }}">
    </form>


</body>
</html>
